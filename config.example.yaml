# LLMeld Configuration
# Copy this file to config.yaml and edit as needed.

gateway:
  # Port for both OpenAI and Anthropic surfaces
  port: 8000
  # API key that downstream clients must send to authenticate with LLMeld
  api_key: "llmeld-local"
  # The model name clients will use — this is what shows up in /v1/models
  model_alias: "llmeld/agent"
  # Enable detailed trace output in logs
  debug_traces: false

# Single provider — the LLM that powers the agentic loop
provider:
  # Options: "openrouter" | "anthropic" | "openai-compatible" | "ollama"
  type: "openrouter"
  # Model ID (use OpenRouter format for openrouter, Anthropic format for anthropic)
  model: "anthropic/claude-sonnet-4-20250514"
  # Name of the environment variable holding the API key (NOT the key itself)
  api_key_env: "OPENROUTER_API_KEY"
  # Base URL (only needed for openrouter or openai-compatible)
  base_url: "https://openrouter.ai/api/v1"
  # OpenRouter attribution headers (optional)
  attribution:
    enabled: true
    http_referer: "https://github.com/your-org/llmeld"
    x_title: "LLMeld"

agent:
  # Maximum agentic loop iterations before forcing a final answer
  max_iterations: 15
  # Execute multiple tool calls in parallel when possible
  parallel_tools: true

logging:
  # Log level: "debug" | "info" | "warn" | "error"
  level: "info"
  # Log format: "jsonl" (structured) or "pretty" (human-readable, for dev)
  format: "pretty"
  # Path to write structured trace logs
  trace_file: "./logs/traces.jsonl"
  # Include estimated token costs in trace logs
  emit_token_costs: true

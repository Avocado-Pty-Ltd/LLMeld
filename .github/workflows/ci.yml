['main]\n  pull_request:\n    branches: [main]\n\njobs:\n  check:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: pnpm/action-setup@v4\n        with:\n          version: 10\n      - uses: actions/setup-node@v4\n        with:\n          node-version: 20\n          cache: pnpm\n      - run: pnpm install --frozen-lockfile\n      - run: pnpm typecheck\n      - run: pnpm test\n\n  build-android:\n    needs: check\n    runs-on: ubuntu-latest\n    strategy:\n      matrix:\n        brand: [ezyBiz, callConcierge]\n    steps:\n      - uses: actions/checkout@v4\n      - uses: pnpm/action-setup@v4\n        with:\n          version: 10\n      - uses: actions/setup-node@v4\n        with:\n          node-version: 20\n          cache: pnpm\n      - run: pnpm install --frozen-lockfile\n      - name: Set up JDK 17\n        uses: actions/setup-java@v4\n        with:\n          java-version: \'17\'\n          distribution: \'adopt\'\n      - name: Build ${{ matrix.brand }} Android Release\n        run: |\n          cd android\n          ./gradlew assemble${{ matrix.brand }}Release\n      - name: Upload ${{ matrix.brand }} APK\n        uses: actions/upload-artifact@v4\n        with:\n          name: ${{ matrix.brand }}-app\n          path: android/app/build/outputs/apk/${{ matrix.brand }}/release/app-${{ matrix.brand }}-release.apk\n\n  test-android:\n    needs: build-android\n    runs-on: ubuntu-latest\n    strategy:\n      matrix:\n        brand: [ezyBiz, callConcierge]\n    steps:\n      - uses: actions/checkout@v4\n      - name: Set up JDK 17\n        uses: actions/setup-java@v4\n        with:\n          java-version: \'17\'\n          distribution: \'adopt\'\n      - name: Run unit tests for ${{ matrix.brand }}\n        run: |\n          cd android\n          ./gradlew test${{ matrix.brand }}DebugUnitTest\n\n  deploy-android:\n    needs: test-android\n    runs-on: ubuntu-latest\n    if: github.ref == \'refs/heads/main\'\n    strategy:\n      matrix:\n        brand: [ezyBiz, callConcierge]\n    steps:\n      - uses: actions/checkout@v4\n      - name: Download ${{ matrix.brand }} APK\n        uses: actions/download-artifact@v4\n        with:\n          name: ${{ matrix.brand }}-app\n      - name: Deploy ${{ matrix.brand }} to Play Store\n        run: |\n          echo "Deploying ${{ matrix.brand }} APK to Play Store', 'Add your deployment commands here']